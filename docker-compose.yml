
#version: '3.9'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 30s
      timeout: 10s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    healthcheck:
      test: ["CMD", "kafka-topics", "--list", "--bootstrap-server", "localhost:29092"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./test.mp4:/app/test.mp4:ro
      - ./captured:/app/captured
      - ./config.example.yaml:/app/config.example.yaml:ro
    environment:
      APP_CONFIG_PATH: /app/config.example.yaml
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092     # ← теперь правильно с ":"
      APP_RTSP_URL: ${APP_RTSP_URL}
      APP_MODEL_NAME: mobilenet_v3_small
      APP_DEVICE: cpu
      APP_FRAME_WIDTH: 640
      APP_FRAME_HEIGHT: 360
      APP_FRAME_SAMPLE_FPS: 2
      APP_LOG_LEVEL: info
    mem_limit: 1.5g # main limit
    mem_reservation: 800m
    deploy: 
      resources:
        limits: 
          memory: 1.5g 
    #depends_on:
    #  kafka:
    #    condition: service_healthy
