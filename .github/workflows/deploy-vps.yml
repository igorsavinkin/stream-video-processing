name: Deploy to VPS (vps_deploy)

on:
  push:
    branches:
      - vps_deploy
  workflow_dispatch:

permissions:
  contents: read
  packages: write  # <--- THIS allows GITHUB_TOKEN to push to GHCR

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # <--- Changed from GHCR_PAT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/igorsavinkin/stream-video-processing/stream-ml:latest
          cache-from: type=registry,ref=ghcr.io/igorsavinkin/stream-video-processing/stream-ml:buildcache
          cache-to: type=registry,ref=ghcr.io/igorsavinkin/stream-video-processing/stream-ml:buildcache,mode=min

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: '30m'
          script: |
            cd /opt/stream-ml
            # We still use GHCR_PAT here because your VPS is outside of GitHub
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u igorsavinkin --password-stdin
            
            echo "🔄 Pulling new image..."
            docker compose pull api --quiet
            
            echo "🔄 Restarting service..."
            docker compose down --remove-orphans || true
            docker compose up -d api
            
            echo "✅ Deploy completed successfully!"
            echo "📍 URL: http://178.208.88.6:8000"
            docker compose logs --tail=30 api
