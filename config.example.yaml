#rtsp_url: auto
#rtsp_url: 0
#rtsp_url: video=USB Video Device
#rtsp_url: C:/Users/igors/Videos/WST/WST-graduation-Video-2025-12-31.mp4
#rtsp_url: rtsp://wowzaec2demo.streamlock.net/vod/mp4:BigBuckBunny_115k.mov
