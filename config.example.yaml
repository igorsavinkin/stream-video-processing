#rtsp_url: rtsp://host.docker.internal:8554/live  # For Docker containers
frame_sample_fps: 2
frame_width: 640
frame_height: 360
#camera_name: USB Video Device
# Classifier models (ImageNet-1K, 1000 classes):
#   resnet50           - best accuracy (~80.9% top-1), ~25M params, recommended
#   efficientnet_b0    - good accuracy (~77.7% top-1), ~5.3M params, lighter
#   mobilenet_v3_small - fastest but weakest (~67.7% top-1), ~2.5M params
# Detector models:
#   person_detector    - Faster R-CNN, person/no_person only
#   coco_detector      - COCO detector (80 classes), requires detection_threshold
model_name: resnet50
#model_name: efficientnet_b0
#model_name: mobilenet_v3_small
#model_name: person_detector
#model_name: coco_detector
device: cpu
metrics_log_every: 50
save_processed: false
processed_dir: data/processed
class_topk: 5
person_score_threshold: 0.6
# detection_threshold: 0.5  # For coco_detector model only
log_level: INFO
capture_inference: false
capture_dir: data/inference
capture_every_n: 10
#capture_s3_bucket: your-s3-bucket
capture_s3_prefix: inference
#fallback_mp4_path: C:/Users/igors/Videos/WST/WST-graduation-Video-2025-12-31.mp4

# Streaming metadata ingestion (Kafka/Kinesis)
# Options: "none", "kafka", "kinesis"
streaming_backend: kafka
# Kafka configuration (when streaming_backend=kafka)
kafka_bootstrap_servers: 127.0.0.1:9092
kafka_topic: inference-events
# Kinesis configuration (when streaming_backend=kinesis)
#kinesis_stream_name: inference-events
#kinesis_region: us-east-1
# Retry configuration
streaming_max_retries: 3
streaming_retry_backoff_ms: 100

# Auth & rate limiting
# Comma-separated API keys; leave empty to disable auth
#api_keys: "key-abc-123,key-def-456"
# Rate limits per endpoint (format: "<count>/<second|minute|hour>")
rate_limit_predict: "30/minute"
rate_limit_stream: "10/minute"
rate_limit_default: "60/minute"

# Kafka Consumer (for Parquet pipeline)
# Enable/disable the Kafka consumer service
kafka_consumer_enabled: false
# Consumer group ID for offset tracking
kafka_consumer_group_id: kafka-to-parquet-group
# Maximum number of records to fetch in a single poll
kafka_consumer_max_poll_records: 100
# What to do when there is no initial offset: earliest, latest, none
kafka_consumer_auto_offset_reset: earliest
# Whether to auto-commit offsets (recommended: false for at-least-once)
kafka_consumer_enable_auto_commit: false
# Session timeout for consumer group
kafka_consumer_session_timeout_ms: 45000
# Heartbeat interval for consumer group
kafka_consumer_heartbeat_interval_ms: 3000
# Maximum time between polls before consumer is considered dead
kafka_consumer_max_poll_interval_ms: 300000

# Parquet Writer (S3 storage)
# S3 bucket for storing Parquet files (required)
parquet_s3_bucket: ""
# AWS region for S3 bucket
parquet_s3_region: us-east-1
# S3 prefix (folder path) for Parquet files
parquet_s3_prefix: inference-events/parquet
# Number of events to accumulate before writing a Parquet file
parquet_batch_size: 1000
# Maximum time (seconds) to wait before flushing a batch
parquet_flush_interval_seconds: 60
# Compression algorithm: snappy, gzip, lz4, zstd, none
parquet_compression: snappy
# Maximum file size in MB before splitting
parquet_max_file_size_mb: 128
# Enable multipart upload for large files
parquet_enable_s3_multipart: true
# Path for storing events that failed processing
parquet_dead_letter_queue_path: data/dead_letter_queue.jsonl
# Partition columns for Hive-style partitioning (comma-separated)
parquet_partition_columns: year,month,day
# Interval in seconds for logging metrics (JSON format)
parquet_metrics_log_every: 60